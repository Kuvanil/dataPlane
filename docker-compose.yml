name: dataplane

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: dataplane-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dataplane
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Broker ───────────────────────────────────────────
  broker:
    image: redis:7-alpine
    container_name: dataplane-broker
    restart: unless-stopped
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dataplane-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dataplane
      CELERY_BROKER_URL: redis://broker:6379/0
      CELERY_RESULT_BACKEND: redis://broker:6379/0
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      REDIS_HOST: broker
      REDIS_PORT: 6379
    volumes:
      - shared_data:/shared/data
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Celery Worker ──────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: dataplane-worker
    restart: unless-stopped
    command: celery -A app.core.celery_app worker --loglevel=info --concurrency=2
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/dataplane
      CELERY_BROKER_URL: redis://broker:6379/0
      CELERY_RESULT_BACKEND: redis://broker:6379/0
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      REDIS_HOST: broker
      REDIS_PORT: 6379
    volumes:
      - shared_data:/shared/data
    depends_on:
      postgres:
        condition: service_healthy
      broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import celery; print('ok')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Frontend (nginx) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: dataplane-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  pgdata:
  redisdata:
  shared_data:
